\* DispatchDedup model-checking configuration
\*
\* Small parameters for CI (~30s).  Increase for nightly runs.

CONSTANTS
    Gateways = {g1, g2}
    Actions = {a1, a2}
    \* Both actions share the same dedup key — the hardest case
    DedupKeys = [a1 |-> k1, a2 |-> k1]
    LockTTL = 2
    MaxTime = 8
    NOBODY = NOBODY
    EMPTY = EMPTY

SPECIFICATION Spec

INVARIANTS
    TypeOK
    DedupSafety
    GlobalDedupSafety
    LockMutex
