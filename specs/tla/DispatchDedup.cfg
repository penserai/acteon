\* DispatchDedup model-checking configuration
\*
\* Small parameters for CI (~seconds).  Increase for nightly runs.
\*
\* All actions share one dedup key (the hardest N:1 case); the mapping is an
\* operator (KeyOf) in the module, so no function literal is needed here.

CONSTANTS
    Gateways = {g1, g2}
    Actions = {a1, a2}
    LockTTL = 2
    DedupTTL = 3
    MaxTime = 6
    NOBODY = NOBODY
    EMPTY = EMPTY

SPECIFICATION Spec

INVARIANTS
    TypeOK
    DedupSafety
