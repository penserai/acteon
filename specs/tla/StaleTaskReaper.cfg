\* StaleTaskReaper model-checking configuration
\*
\* Small parameters for CI (~seconds). The staleness predicate is_stale_at is an
\* operator (IsStaleAt) in the module, so no function literal is needed here.

CONSTANTS
    Producers = {p1, p2}
    MaxVer = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    NoReapHeartbeated
    ReapOnlyStale
    ReapAtMostOnce
